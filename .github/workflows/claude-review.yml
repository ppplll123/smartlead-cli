name: AI Code Review (OpenAI)

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-review]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff ${{ github.event.pull_request.base.sha }}..HEAD -- . ':(exclude)*.lock' ':(exclude)package-lock.json' | head -c 50000)
          else
            DIFF=$(git diff HEAD~1..HEAD -- . ':(exclude)*.lock' ':(exclude)package-lock.json' 2>/dev/null | head -c 50000 || echo "Initial commit")
          fi
          # Escape for JSON
          DIFF_ESCAPED=$(echo "$DIFF" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          echo "diff=$DIFF_ESCAPED" >> $GITHUB_OUTPUT

      - name: AI Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @- <<PAYLOAD
          {
            "model": "gpt-4o",
            "temperature": 0.1,
            "messages": [
              {
                "role": "system",
                "content": "You are a senior code reviewer. Review the git diff below. Report ONLY real issues — not style preferences. Categories: CRITICAL (blocks merge), WARNING (should fix), INFO (consider). Be concise. If no issues found, say 'No issues found.'"
              },
              {
                "role": "user",
                "content": "Review this diff for:\n1. Silent failures — undefined returns, swallowed errors, empty catch blocks\n2. Cross-file consistency — exports match imports, shared constants in sync\n3. Hardcoded secrets — API keys, tokens, passwords\n4. Missing error handling — async without try-catch, unhandled promises\n5. Logic errors — off-by-one, wrong comparisons, unreachable code\n6. Security — injection risks, unsanitized input\n\nDiff:\n${{ steps.diff.outputs.diff }}"
              }
            ]
          }
          PAYLOAD
          )

          REVIEW=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('choices',[{}])[0].get('message',{}).get('content','Error: No response'))" 2>/dev/null || echo "Error parsing response")

          echo "## AI Code Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @- <<PAYLOAD
          {
            "model": "gpt-4o",
            "temperature": 0.1,
            "messages": [
              {
                "role": "system",
                "content": "You are a senior code reviewer. Review the git diff. Report ONLY real issues. Be concise. Use markdown formatting."
              },
              {
                "role": "user",
                "content": "Review this diff:\n${{ steps.diff.outputs.diff }}"
              }
            ]
          }
          PAYLOAD
          )

          REVIEW=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('choices',[{}])[0].get('message',{}).get('content','No issues found.'))")

          gh pr comment ${{ github.event.pull_request.number }} --body "## 🤖 AI Code Review (GPT-4o)

          $REVIEW

          ---
          *Automated review by OpenAI GPT-4o*"
